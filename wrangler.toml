name = "marketmaker"
main = "src/worker.ts"
compatibility_date = "2026-01-01"

# Secret (never commit) — set with:
#   wrangler secret put TXLINE_API_KEY
# (No Claude API — quoting is pure math. No Container — a Durable Object polls TxLINE
#  odds/scores on an alarm, runs the risk timers, and fans out quotes over WebSocket.)

[assets]
directory = "./public"
binding = "ASSETS"

# One QuoteRoom per fixture: fair value, spreads, inventory/P&L, trade fills, broadcast.
[[durable_objects.bindings]]
name = "QUOTE_ROOM"
class_name = "QuoteRoom"

[[migrations]]
tag = "v1"
new_classes = ["QuoteRoom"]
