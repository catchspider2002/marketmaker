<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description"
    content="Autonomous in-play market maker quoting continuous bid/ask prices on World Cup outcomes with live risk management." />
  <title>MarketMaker - In-Play Quotes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="/styles.css?v=2" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>
  <header class="topbar">
    <span class="brand">MarketMaker</span>
    <span id="conn" class="muted"></span>
  </header>
  <main class="wrap">
    <div class="row">
      <select id="fixture" class="input">
        <option value="">Loading matches…</option>
      </select>
      <span id="phase" class="pill">-</span>
    </div>

    <section class="panel">
      <h2>Live quotes</h2>
      <table class="quotes">
        <thead>
          <tr>
            <th></th>
            <th id="h-home">Home</th>
            <th>Draw</th>
            <th id="h-away">Away</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="lbl">Fair</td>
            <td id="f-home">-</td>
            <td id="f-draw">-</td>
            <td id="f-away">-</td>
          </tr>
          <tr>
            <td class="lbl">Bid</td>
            <td id="b-home">-</td>
            <td id="b-draw">-</td>
            <td id="b-away">-</td>
          </tr>
          <tr>
            <td class="lbl">Ask</td>
            <td id="a-home">-</td>
            <td id="a-draw">-</td>
            <td id="a-away">-</td>
          </tr>
          <tr>
            <td class="lbl">Spread</td>
            <td id="s-home">-</td>
            <td id="s-draw">-</td>
            <td id="s-away">-</td>
          </tr>
          <tr>
            <td class="lbl">Status</td>
            <td id="st-home">-</td>
            <td id="st-draw">-</td>
            <td id="st-away">-</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section class="panel">
      <h2>Spread history</h2>
      <canvas id="chart" height="120"></canvas>
    </section>

    <section class="panel">
      <h2>Inventory &amp; P&amp;L</h2>
      <table class="inv">
        <thead>
          <tr>
            <th>Market</th>
            <th>Position</th>
            <th>Avg price</th>
            <th>Realised</th>
          </tr>
        </thead>
        <tbody id="inv-body"></tbody>
      </table>
      <div id="pnl" class="pnl muted">-</div>
    </section>

    <section class="panel">
      <h2>Trade terminal</h2>
      <div class="row">
        <select id="t-market" class="input">
          <option value="home" id="tm-home">Home</option>
          <option value="draw">Draw</option>
          <option value="away" id="tm-away">Away</option>
        </select>
        <select id="t-side" class="input">
          <option value="buy">Buy</option>
          <option value="sell">Sell</option>
        </select>
        <input id="t-size" class="input" type="number" value="10" min="1" max="100" />
        <button id="t-exec" class="btn primary">Execute</button>
      </div>
      <div id="t-out" class="out muted"></div>
    </section>

    <section class="panel demo" id="demo-controls" style="display:none">
      <h2>Demo controls</h2>
      <div class="row">
        <button id="m-goal" class="btn">Simulate goal (pause + widen)</button>
        <span class="sep"></span>
        <input id="o-home" class="input sm" type="number" step="0.01" value="2.10" />
        <input id="o-draw" class="input sm" type="number" step="0.01" value="3.40" />
        <input id="o-away" class="input sm" type="number" step="0.01" value="3.20" />
        <button id="m-odds" class="btn">Set fair odds (decimal)</button>
      </div>
      <p class="muted" style="font-size:12.5px">Use these to demo without a live match. Real matches drive quotes
        automatically from TxLINE.</p>
    </section>
  </main>
  <script src="/app.js?v=2"></script>
</body>

</html>
